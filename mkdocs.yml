site_name: Pawleys Logic
site_url: https://pawleyslogic.com

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
  features:
    - navigation.tabs

nav:
  - Home: index.md
  # Intentionally NOT in nav (still accessible by URL):
  # pawleysplayr/links.md  -> https://pawleyslogic.com/pawleysplayr/links/

markdown_extensions:
  - admonition
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg

extra:
  include_cname: true
